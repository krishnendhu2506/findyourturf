<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Turfs - Nearby Turf Finder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="px-6 py-6">
    <nav class="max-w-6xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="h-10 w-10 rounded-full border border-emerald-400 flex items-center justify-center text-emerald-400">FT</div>
        <div>
          <p class="text-white font-semibold">Nearby Turf Finder</p>
          <p class="text-xs text-slate-400">Palakkad</p>
        </div>
      </div>
      <div class="hidden md:flex items-center gap-6 text-sm">
        <a data-nav href="index.html" class="text-slate-300 hover:text-emerald-400">Home</a>
        <a data-nav href="turfs.html" class="text-slate-300 hover:text-emerald-400">Turfs</a>
        <a data-nav href="history.html" class="text-slate-300 hover:text-emerald-400">Bookings</a>
      </div>
      <a href="history.html" class="neon-btn px-4 py-2 rounded-xl text-sm">View History</a>
    </nav>
  </header>

  <main class="px-6 pb-16">
    <section class="max-w-6xl mx-auto">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div>
          <h1 class="section-title text-4xl text-white">Choose Your Turf</h1>
          <p class="text-slate-400 mt-2">Tap into Palakkad's best football turfs with neon-fast bookings.</p>
        </div>
        <input id="searchInput" type="text" placeholder="Search by turf or location" class="bg-slate-950/60 border border-slate-700 text-sm text-slate-200 rounded-xl px-4 py-2 w-full md:w-72 focus:outline-none focus:border-emerald-400" />
      </div>
    </section>

    <section class="max-w-6xl mx-auto mt-10">
      <div id="turfGrid" class="card-grid"></div>
    </section>

    <section class="max-w-6xl mx-auto mt-16">
      <div class="neon-border rounded-3xl p-8 bg-slate-950/60">
        <h2 class="section-title text-3xl text-white">Admin Control</h2>
        <p class="text-slate-400 mt-2">Add new turfs to the listing in seconds.</p>
        <form id="adminForm" class="mt-6 grid md:grid-cols-2 gap-4">
          <input name="turf_name" required placeholder="Turf Name" class="bg-slate-950/60 border border-slate-700 text-sm text-slate-200 rounded-xl px-4 py-2 focus:outline-none focus:border-emerald-400" />
          <input name="location" required placeholder="Location" class="bg-slate-950/60 border border-slate-700 text-sm text-slate-200 rounded-xl px-4 py-2 focus:outline-none focus:border-emerald-400" />
          <input name="sport_type" required value="Football" class="bg-slate-950/60 border border-slate-700 text-sm text-slate-200 rounded-xl px-4 py-2 focus:outline-none focus:border-emerald-400" />
          <input name="rating" type="number" step="0.1" min="1" max="5" required placeholder="Rating" class="bg-slate-950/60 border border-slate-700 text-sm text-slate-200 rounded-xl px-4 py-2 focus:outline-none focus:border-emerald-400" />
          <input name="price_per_hour" type="number" min="100" required placeholder="Price per hour" class="bg-slate-950/60 border border-slate-700 text-sm text-slate-200 rounded-xl px-4 py-2 focus:outline-none focus:border-emerald-400" />
          <button type="submit" class="neon-btn px-6 py-3 rounded-xl">Add Turf</button>
        </form>
        <p id="adminMessage" class="mt-3"></p>
      </div>
    </section>
  </main>

  <footer class="px-6 pb-10">
    <div class="max-w-6xl mx-auto footer-line pt-6 flex flex-col md:flex-row justify-between gap-4 text-sm text-slate-500">
      <span>Nearby Turf Finder & Booking System</span>
      <span data-year></span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/turfs.js"></script>
</body>
</html>
