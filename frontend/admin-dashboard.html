<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard - Find Your Turf</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <header class="px-6 py-6 bg-white shadow-sm">
    <nav class="max-w-6xl mx-auto flex items-center justify-between">
      <div class="logo">
        <img src="assets/logos/logo.svg" alt="Find Your Turf logo" />
        <div>
          <p class="text-lg font-semibold">Find Your Turf</p>
          <p class="text-xs muted">Admin Dashboard</p>
          <p class="text-[10px] muted">UI v20260321</p>
        </div>
      </div>
      <button id="adminLogout" class="btn-outline px-4 py-2 rounded-xl">Logout</button>
    </nav>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-10 space-y-10">
    <section class="glass rounded-3xl p-6">
      <h2 class="text-3xl">Turf Management</h2>
      <form id="addTurfForm" class="grid md:grid-cols-3 gap-4 mt-4">
        <input name="turf_name" placeholder="Turf name" required class="border border-slate-200 rounded-xl px-4 py-2" />
        <input name="location" placeholder="Location" required class="border border-slate-200 rounded-xl px-4 py-2" />
        <input name="rating" type="number" step="0.1" min="1" max="5" placeholder="Rating" required
          class="border border-slate-200 rounded-xl px-4 py-2" />
        <input name="price_per_hour" type="number" min="100" placeholder="Price per hour" required
          class="border border-slate-200 rounded-xl px-4 py-2" />
        <input name="image_url" placeholder="Image URL" required class="border border-slate-200 rounded-xl px-4 py-2" />
        <button class="btn-primary px-6 py-3 rounded-xl" type="submit">Add Turf</button>
      </form>
      <p id="turfMessage" class="text-sm mt-2"></p>
      <div id="turfList" class="mt-6 grid md:grid-cols-2 gap-4"></div>
    </section>

    <section class="glass rounded-3xl p-6">
      <h2 class="text-3xl">Slot Management</h2>
      <div class="mt-4 flex flex-col md:flex-row gap-4">
        <select id="slotTurfSelect"
          class="bg-slate-800 border border-slate-600 text-slate-200 rounded-xl px-4 py-2"></select>
        <button id="createSlotsBtn" class="btn-primary px-6 py-3 rounded-xl">Create Default Slots</button>
      </div>
      <div id="slotAdminTable" class="mt-4"></div>
    </section>

    <section class="glass rounded-3xl p-6">
      <h2 class="text-3xl">Booking Management</h2>
      <div class="mt-6 overflow-x-auto">
        <table class="min-w-full text-sm">
          <thead>
            <tr class="text-left">
              <th class="py-3">User Name</th>
              <th>Turf Name</th>
              <th>Date</th>
              <th>Time Slot</th>
              <th>Screenshot</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="bookingRequestsTable"></tbody>
        </table>
      </div>
      <p id="bookingRequestsMessage" class="text-sm mt-3"></p>
    </section>

    <section class="glass rounded-3xl p-6">
      <h2 class="text-3xl">Refund Management</h2>
      <div id="refundList" class="mt-4 space-y-3"></div>
    </section>

    <section class="glass rounded-3xl p-6">
      <h2 class="text-3xl">Registered Users</h2>
      <div id="userList" class="mt-4 grid md:grid-cols-2 gap-4"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="js/auth.js?v=20260321"></script>
  <script src="js/payments.js?v=20260321"></script>
  <script src="js/admin.js?v=20260321"></script>
  <script>
    (() => {
      const show = (text) => {
        const msg = document.getElementById("bookingRequestsMessage");
        if (!msg) return;
        msg.textContent = text;
        msg.className = "text-sm text-rose-600";
      };

      window.addEventListener("error", (e) => {
        const filename = (e && e.filename) || "";
        if (filename.includes("admin-bookings.js")) {
          show(`admin-bookings.js error: ${e.message || "unknown"} (line ${e.lineno || "?"}).`);
        }
      });

      window.addEventListener("unhandledrejection", (e) => {
        const reason = (e && e.reason) || null;
        const message = reason && reason.message ? reason.message : String(reason || "unknown");
        show(`Unhandled error: ${message}`);
      });

      window.setTimeout(() => {
        if (window.__adminBookingsLoaded) return;
        try {
          fetch("js/admin-bookings.js?v=20260321", { cache: "no-store" })
            .then((resp) => resp.text())
            .then((code) => {
              try {
                // Parse-only check: if this throws, the browser can't parse the file.
                // (Does not execute the code.)
                // eslint-disable-next-line no-new-func
                new Function(code);
                show("admin-bookings.js loaded but did not execute. Open DevTools Console and look for a SyntaxError or blocked script.");
              } catch (err) {
                const msg = err && err.message ? err.message : String(err || "unknown");
                show(`admin-bookings.js parse error: ${msg}`);
              }
            })
            .catch((err) => {
              const msg = err && err.message ? err.message : String(err || "unknown");
              show(`Unable to fetch admin-bookings.js for diagnostics: ${msg}`);
            });
        } catch (err) {
          const msg = err && err.message ? err.message : String(err || "unknown");
          show(`Diagnostics failed: ${msg}`);
        }
      }, 3000);
    })();
  </script>
  <script src="js/admin-bookings.boot.js?v=20260321"></script>
  <script>
    console.log("admin-dashboard UI v20260321", { adminBookingsLoaded: window.__adminBookingsLoaded });
    window.setTimeout(() => {
      const msg = document.getElementById("bookingRequestsMessage");
      const tbody = document.getElementById("bookingRequestsTable");
      if (!msg) return;
      if (window.__adminBookingsLoaded) return;
      msg.textContent = "admin-bookings.js is not running. Hard refresh (Ctrl+F5) and ensure you opened frontend/admin-dashboard.html (not an old tab/deployed URL).";
      msg.className = "text-sm text-rose-600";
      if (tbody) {
        tbody.innerHTML = `
          <tr class="table-row">
            <td class="py-3 text-rose-600" colspan="7">Bookings UI script is not running (check DevTools Console/Network).</td>
          </tr>
        `;
      }
    }, 3500);
  </script>
</body>

</html>
