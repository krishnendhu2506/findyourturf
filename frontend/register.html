<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - Find Your Turf</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body class="min-h-screen flex items-center justify-center bg-green-50">
  <div class="w-full max-w-lg glass rounded-3xl p-8">
    <div class="logo mb-6">
      <img src="assets/logos/logo.svg" alt="Find Your Turf logo" />
      <div>
        <p class="text-xl font-semibold">Find Your Turf</p>
        <p class="text-xs muted">Create Account</p>
      </div>
    </div>

    <form id="registerForm" class="grid md:grid-cols-2 gap-4">
      <div class="md:col-span-2">
        <label class="text-sm font-medium">Full Name</label>
        <input name="name" required
          class="mt-1 w-full bg-slate-800 border border-slate-600 text-slate-200 rounded-xl px-4 py-2 focus:outline-none focus:border-green-500" />
      </div>
      <div>
        <label class="text-sm font-medium">Email</label>
        <input name="email" type="email" required
          class="mt-1 w-full bg-slate-800 border border-slate-600 text-slate-200 rounded-xl px-4 py-2 focus:outline-none focus:border-green-500" />
      </div>
      <div>
        <label class="text-sm font-medium">Phone Number</label>
        <input name="phone_number" required
          class="mt-1 w-full bg-slate-800 border border-slate-600 text-slate-200 rounded-xl px-4 py-2 focus:outline-none focus:border-green-500" />
      </div>
      <div>
        <label class="text-sm font-medium">Location</label>
        <input name="location" required
          class="mt-1 w-full bg-slate-800 border border-slate-600 text-slate-200 rounded-xl px-4 py-2 focus:outline-none focus:border-green-500" />
      </div>
      <div>
        <label class="text-sm font-medium">Password</label>
        <input name="password" type="password" required
          class="mt-1 w-full bg-slate-800 border border-slate-600 text-slate-200 rounded-xl px-4 py-2 focus:outline-none focus:border-green-500" />
      </div>
      <div class="md:col-span-2">
        <button type="submit" class="btn-primary w-full py-3 rounded-xl">Register</button>
        <p id="registerMessage" class="text-sm mt-2"></p>
      </div>
    </form>

    <p class="text-sm text-center mt-6">Already have an account? <a href="login.html"
        class="text-green-600 font-medium">Login</a></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="js/auth.js"></script>
</body>

</html>
